name: Continuous Integration & Deployment (Self-Hosted Runner)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy via Self-Hosted Server Runner
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rebuild & Restart Docker Containers
        run: |
          echo "Starting local deployment on server..."
          docker compose up -d --build
          docker image prune -f
          echo "Deployment completed successfully!"
