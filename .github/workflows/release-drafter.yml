name: Release Drafter

on:
  push:
    # Memicu pembuatan draf rilis setiap kali ada commit baru masuk ke main (misal setelah PR di-merge)
    branches:
      - main
  pull_request:
    # Memperbarui draf rilis saat Pull Request dibuat/diupdate
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  update_release_draft:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
